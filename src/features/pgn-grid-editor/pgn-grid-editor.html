@if (file(); as file) {
  <div class="pgn-grid-editor">
    <header class="pgn-grid-editor__header">
      <div class="pgn-grid-editor__heading">
        <h2 class="pgn-grid-editor__title">
          <input
            class="pgn-grid-editor__title-input"
            type="text"
            [formControl]="titleControl"
            (blur)="commitTitle()"
            (keydown.enter)="commitTitle()"
            aria-label="Comparison file title"
            placeholder="Untitled comparison"
          />
        </h2>
        <p class="pgn-grid-editor__summary">
          {{ summary().valid }} of {{ summary().total }} valid
        </p>
      </div>
      <button
        matButton="filled"
        type="button"
        (click)="save()"
        [disabled]="!summary().allValid"
      >
        <mat-icon>save</mat-icon>
        Save file
      </button>
    </header>

    <mat-accordion
      class="pgn-grid-editor__entries"
      multi
      cdkDropList
      (cdkDropListDropped)="onReorder($event)"
    >
      @for (entry of entries(); track entry.id; let i = $index) {
        <!-- Handle and remove sit beside the panel (not inside its role="button"
             header) so no interactive control is nested inside another. -->
        <div class="entry-panel" cdkDrag cdkDragLockAxis="y">
          <button
            matIconButton
            type="button"
            cdkDragHandle
            class="entry-panel__handle"
            aria-label="Reorder line (drag)"
          >
            <mat-icon>drag_indicator</mat-icon>
          </button>

          <!-- The title input is a sibling of the header (not nested in its
               role="button"), overlaid on the header's title zone so it stays
               AXE-clean while remaining editable even when collapsed. -->
          <input
            #labelInput
            class="entry-panel__title-input"
            type="text"
            [value]="entry.label || ''"
            [attr.placeholder]="'Line ' + (i + 1)"
            [attr.aria-label]="'Line ' + (i + 1) + ' title'"
            (change)="onLabelChange(entry.id, labelInput.value)"
            (keydown.enter)="labelInput.blur()"
          />

          <mat-expansion-panel
            class="entry-panel__panel"
            hideToggle
            [expanded]="isExpanded(entry.id)"
            (expandedChange)="setExpanded(entry.id, $event)"
          >
            <mat-expansion-panel-header>
              <mat-panel-title class="entry-panel__title">
                <mat-icon
                  class="entry-panel__chevron"
                  [class.entry-panel__chevron--open]="isExpanded(entry.id)"
                  aria-hidden="true"
                >
                  expand_more
                </mat-icon>
              </mat-panel-title>
              <mat-panel-description class="entry-panel__meta">
                @switch (statusOf(entry)) {
                  @case ('valid') {
                    <span class="entry-panel__status entry-panel__status--valid">
                      <mat-icon aria-hidden="true">check_circle</mat-icon>
                      Valid
                    </span>
                  }
                  @case ('invalid') {
                    <span class="entry-panel__status entry-panel__status--invalid">
                      <mat-icon aria-hidden="true">error</mat-icon>
                      Invalid
                    </span>
                  }
                  @default {
                    <span class="entry-panel__status entry-panel__status--empty">Empty</span>
                  }
                }
              </mat-panel-description>
            </mat-expansion-panel-header>

            <app-pgn-container
              [initialPgn]="entry.pgn"
              (contentChange)="onEntryChange(entry.id, $event)"
            />
          </mat-expansion-panel>

          <button
            matIconButton
            type="button"
            class="entry-panel__remove"
            [disabled]="entries().length <= 1"
            [attr.aria-label]="'Remove ' + labelFor(entry, i)"
            (click)="confirmRemove(entry.id, labelFor(entry, i))"
          >
            <mat-icon>delete_outline</mat-icon>
          </button>
        </div>
      }
    </mat-accordion>

    <button matButton="outlined" type="button" (click)="addEntry()">
      <mat-icon>add</mat-icon>
      Add PGN
    </button>
  </div>
}
