<mat-nav-list aria-label="Main navigation">
  <a
    mat-list-item
    routerLink="/"
    routerLinkActive
    #homeLink="routerLinkActive"
    [routerLinkActiveOptions]="{ exact: true }"
    [activated]="homeLink.isActive"
    [attr.aria-current]="homeLink.isActive ? 'page' : null"
    (click)="navigate.emit()"
  >
    <mat-icon matListItemIcon fontSet="material-symbols-outlined">home</mat-icon>
    <span matListItemTitle>Home</span>
  </a>
</mat-nav-list>
