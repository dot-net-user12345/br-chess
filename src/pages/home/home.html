<section
  class="workspace"
  [class.workspace--resizing]="resizing()"
  [style.--explorer-width]="explorerWidth() + 'px'"
>
  <aside class="workspace__explorer">
    <app-file-explorer />
    <div
      class="workspace__resizer"
      role="separator"
      aria-orientation="vertical"
      aria-label="Resize file explorer"
      tabindex="0"
      [attr.aria-valuemin]="minWidth"
      [attr.aria-valuemax]="maxWidth"
      [attr.aria-valuenow]="explorerWidth()"
      (pointerdown)="onResizeStart($event)"
      (pointermove)="onResizeMove($event)"
      (pointerup)="onResizeEnd($event)"
      (keydown)="onResizeKey($event)"
    ></div>
  </aside>

  <div class="workspace__main">
    @if (status(); as status) {
      <p
        class="workspace__status"
        [class.workspace__status--error]="status.type === 'error'"
        [class.workspace__status--success]="status.type === 'success'"
        role="status"
        aria-live="polite"
      >
        {{ status.text }}
      </p>
    }

    @if (selectedFile(); as file) {
      <app-pgn-grid-editor [fileId]="file.id" />
    } @else {
      <div class="workspace__empty">
        <h1 class="workspace__empty-title">Chess workspace</h1>
        <p>
          Create folders and PGN grid files in the panel on the left, then select a file to paste
          its PGNs and preview each game as a grid of boards.
        </p>
      </div>
    }
  </div>
</section>
