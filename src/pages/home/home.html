<section class="workspace">
  <aside class="workspace__explorer">
    <app-file-explorer />
  </aside>

  <div class="workspace__main">
    @if (status(); as status) {
      <p
        class="workspace__status"
        [class.workspace__status--error]="status.type === 'error'"
        [class.workspace__status--success]="status.type === 'success'"
        role="status"
        aria-live="polite"
      >
        {{ status.text }}
      </p>
    }

    @if (selectedFile(); as file) {
      <app-pgn-grid-editor [fileId]="file.id" />
    } @else {
      <div class="workspace__empty">
        <h1 class="workspace__empty-title">Chess workspace</h1>
        <p>
          Create folders and PGN grid files in the panel on the left, then select a file to paste
          its PGNs and preview each game as a grid of boards.
        </p>
      </div>
    }
  </div>
</section>
